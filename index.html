<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f3dc" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Bloom Hop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-flower" aria-hidden="true"><i></i></span>
          <div>
            <p>COZY RHYTHM GARDEN</p>
            <h1>BLOOM HOP</h1>
          </div>
        </div>
        <button id="pause" class="icon-button" type="button" aria-label="일시 정지" title="일시 정지">
          <span class="pause-icon" aria-hidden="true"></span>
        </button>
      </header>

      <section class="mission-strip" aria-live="polite">
        <div class="garden-badge">
          <span>GARDEN</span>
          <strong id="depth">01</strong>
        </div>
        <div class="mission-copy">
          <span id="room-name">새싹 뜰</span>
          <strong id="objective">물뿌리개를 꽃밭까지 밀어 주세요</strong>
        </div>
        <div id="seal-status" class="bloom-status" aria-label="꽃밭 진행도">0/1</div>
      </section>

      <section class="game-frame" aria-label="Bloom Hop 게임 화면">
        <div class="hud">
          <div class="hud-stat"><span>씨앗</span><strong id="gold">0</strong></div>
          <div class="hud-stat"><span>반짝임</span><strong id="combo">0</strong></div>
          <div class="hud-stat score"><span>정원 점수</span><strong id="score">0</strong></div>
        </div>

        <div class="canvas-wrap">
          <canvas id="game" width="900" height="900" aria-label="마법 정원 퍼즐"></canvas>
          <div class="sun-wash" aria-hidden="true"></div>
          <div id="floating-message" class="floating-message" aria-live="polite"></div>

          <div id="overlay" class="overlay">
            <div class="overlay-content">
              <div class="hero-bunny" aria-hidden="true"></div>
              <p class="eyebrow">MOMO'S LITTLE GARDEN</p>
              <h2>천천히, 한 박자씩<br /><em>꽃을 피워요</em></h2>
              <p class="intro-copy">방향은 언제 눌러도 다음 걸음으로 예약돼요. 박자를 놓쳐도 괜찮고, 꽃이 활짝 열릴 때 누르면 작은 보너스를 받아요.</p>
              <div class="tempo-select" aria-label="산책 속도 선택">
                <button class="tempo is-active" data-bpm="76" type="button"><span>느긋하게</span>76</button>
                <button class="tempo" data-bpm="88" type="button"><span>산뜻하게</span>88</button>
                <button class="tempo" data-bpm="100" type="button"><span>통통하게</span>100</button>
              </div>
              <button id="start" class="primary-action" type="button">
                <span>정원 산책 시작</span><i aria-hidden="true"></i>
              </button>
            </div>
          </div>

          <div id="pause-panel" class="pause-panel" hidden>
            <span class="pause-daisy" aria-hidden="true"></span>
            <strong>잠깐 쉬어가요</strong>
            <button id="resume" type="button">계속 산책하기</button>
            <button id="restart" type="button">첫 정원부터</button>
          </div>
        </div>

        <div class="step-console">
          <div class="queue-panel">
            <span class="console-label">예약 걸음</span>
            <div id="queue-slots" class="queue-slots" aria-label="예약된 이동">
              <span class="queue-slot" data-slot="0"></span>
              <span class="queue-slot" data-slot="1"></span>
              <span class="queue-slot" data-slot="2"></span>
            </div>
          </div>
          <div class="beat-panel">
            <div class="beat-copy">
              <span id="timing-dot" class="timing-dot"></span>
              <strong id="timing-text">언제든 예약 가능</strong>
            </div>
            <div id="beat-track" class="beat-track" aria-hidden="true">
              <span class="beat-fill"></span>
              <span class="beat-flower"><i></i></span>
            </div>
          </div>
          <div class="beat-count"><strong id="beat-number">1</strong><span>STEP</span></div>
        </div>
      </section>

      <nav id="touch-pad" class="touch-pad" aria-label="이동 조작">
        <button class="pad-btn up" data-dir="up" type="button" aria-label="위로 이동"><span></span></button>
        <button class="pad-btn left" data-dir="left" type="button" aria-label="왼쪽으로 이동"><span></span></button>
        <div class="pad-core" aria-hidden="true"><span id="queue-count">0</span><small>/ 3</small></div>
        <button class="pad-btn right" data-dir="right" type="button" aria-label="오른쪽으로 이동"><span></span></button>
        <button class="pad-btn down" data-dir="down" type="button" aria-label="아래로 이동"><span></span></button>
      </nav>
    </main>

    <script src="./src/game.js" defer></script>
  </body>
</html>
